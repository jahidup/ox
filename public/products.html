<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { colors: { neon: '#2d8eff' } } } } </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">
    <div id="navbar-placeholder"></div>

    <section class="py-20">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-4xl font-bold font-display text-white mb-10 text-center">All <span class="neon-text">Products</span></h1>
            <div id="productGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init();
        fetch('/api/products').then(r=>r.json()).then(products=>{
            document.getElementById('productGrid').innerHTML = products.map(p=>`
                <div class="glass-card p-5 group" data-aos="fade-up">
                    <img src="${p.images[0]}" class="h-52 w-full object-cover rounded-xl mb-3" alt="${p.name}">
                    <p class="text-xs text-neon">${p.category}</p>
                    <h3 class="font-semibold text-white">${p.name}</h3>
                    <p class="text-sm text-gray-400">₹${p.price} · ${p.colors.length} colors</p>
                    <a href="product-detail.html?id=${p._id}" class="btn-outline text-xs py-2 px-4 mt-3 block text-center">View Details</a>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
