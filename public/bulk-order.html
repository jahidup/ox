<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Order – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { colors: { neon: '#2d8eff' } } } } </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">
    <div id="navbar-placeholder"></div>

    <section class="py-20">
        <div class="max-w-3xl mx-auto px-4">
            <h1 class="text-4xl font-bold font-display text-white mb-10 text-center">Bulk <span class="neon-text">Order Inquiry</span></h1>
            <form id="bulkOrderForm" class="glass-card-premium p-8 space-y-5">
                <div class="grid sm:grid-cols-2 gap-4">
                    <input name="instituteName" placeholder="Institute Name *" required class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    <input name="contactPerson" placeholder="Contact Person *" required class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    <input name="phone" type="tel" placeholder="Phone *" required class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    <input name="email" type="email" placeholder="Email *" required class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    <select name="productType" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white"><option>T‑Shirt</option><option>Polo</option><option>Hoodie</option><option>Jersey</option><option>Other</option></select>
                    <input name="quantity" type="number" placeholder="Quantity *" required min="50" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-neon outline-none">
                    <input name="sizes" placeholder="Sizes (e.g., S,M,L)" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white">
                    <input name="deadline" type="date" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white">
                    <input name="budget" placeholder="Budget (approx)" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white">
                </div>
                <textarea name="message" placeholder="Additional details" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white"></textarea>
                <button type="submit" class="btn-primary w-full py-4 text-lg">Submit & Chat on WhatsApp <i class="fab fa-whatsapp ml-2"></i></button>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init();
        document.getElementById('bulkOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            const msg = `📦 *Bulk Inquiry*\n🏢 ${data.instituteName}\n👤 ${data.contactPerson}\n📞 ${data.phone}\n📧 ${data.email}\n📦 ${data.productType}\n🔢 ${data.quantity} pcs\n📏 ${data.sizes}\n📅 ${data.deadline}\n💰 ${data.budget}`;
            window.open(`https://wa.me/918055698328?text=${encodeURIComponent(msg)}`, '_blank');
            showToast('Inquiry submitted! Opening WhatsApp...');
        });
    </script>
</body>
</html>
