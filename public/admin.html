<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { colors: { neon: '#2d8eff' } } } } </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body class="bg-[#06060a] text-gray-200">
    <div id="navbar-placeholder"></div>

    <section class="py-20">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-4xl font-bold font-display text-white mb-10 text-center">Admin <span class="neon-text">Panel</span></h1>

            <!-- Stats -->
            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                <div class="glass-card p-5 flex items-center gap-4"><div class="w-12 h-12 bg-neon/10 rounded-xl flex items-center justify-center text-neon text-2xl"><i class="fas fa-inbox"></i></div><div><p class="text-2xl font-bold text-white" id="totalLeads">0</p><p class="text-sm text-gray-400">Total Leads</p></div></div>
                <div class="glass-card p-5 flex items-center gap-4"><div class="w-12 h-12 bg-green-500/10 rounded-xl flex items-center justify-center text-green-400 text-2xl"><i class="fas fa-clock"></i></div><div><p class="text-2xl font-bold text-white" id="newLeads">0</p><p class="text-sm text-gray-400">New</p></div></div>
                <div class="glass-card p-5 flex items-center gap-4"><div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-400"><i class="fas fa-truck"></i></div><div><p class="text-2xl font-bold text-white" id="dispatched">0</p><p class="text-sm text-gray-400">Dispatched</p></div></div>
                <div class="glass-card p-5 flex items-center gap-4"><div class="w-12 h-12 bg-purple-500/10 rounded-xl flex items-center justify-center text-purple-400"><i class="fas fa-check-double"></i></div><div><p class="text-2xl font-bold text-white" id="delivered">0</p><p class="text-sm text-gray-400">Delivered</p></div></div>
            </div>

            <!-- Lead Management Table -->
            <div class="glass-card-premium p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-semibold text-white">Lead <span class="neon-text">Management</span></h3>
                    <input type="text" id="searchLead" placeholder="Search leads..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white text-sm focus:border-neon outline-none max-w-xs">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-gray-300" id="leadsTable">
                        <thead class="text-xs text-gray-400 uppercase border-b border-white/5">
                            <tr><th class="px-4 py-3">Inquiry ID</th><th class="px-4 py-3">Customer</th><th class="px-4 py-3">Product</th><th class="px-4 py-3">Date</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Actions</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="grid sm:grid-cols-3 gap-6 mt-10">
                <a href="products.html" class="glass-card p-5 flex items-center gap-4 hover:border-neon/50"><i class="fas fa-box text-neon"></i> Manage Products</a>
                <button onclick="exportLeads()" class="glass-card p-5 flex items-center gap-4 hover:border-neon/50"><i class="fas fa-download text-green-400"></i> Export Leads</button>
                <div class="glass-card p-5 flex items-center gap-4 hover:border-neon/50"><i class="fas fa-cog text-purple-400"></i> Settings</div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <a href="https://wa.me/918055698328" target="_blank" class="fixed bottom-6 right-6 z-50 w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl shadow-2xl hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/app.js"></script>
    <script>
        AOS.init();
        // app.js's setupAdminPage() will populate everything
    </script>
</body>
</html>
