<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Your Brand</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { colors: { neon: '#2d8eff' } } } } </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#06060a] text-gray-200">
    <div id="navbar-placeholder"></div>

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="glass-card-premium p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <div class="w-16 h-16 mx-auto bg-neon/10 rounded-2xl flex items-center justify-center text-neon text-2xl mb-4"><i class="fas fa-lock"></i></div>
                <h2 class="text-2xl font-bold text-white">Forgot <span class="neon-text">Password</span>?</h2>
                <p class="text-gray-400 mt-2">Enter your email and we'll send you a reset link.</p>
            </div>
            <form id="forgotForm" class="space-y-4">
                <input type="email" name="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white">
                <button type="submit" class="btn-primary w-full">Send Reset Link</button>
            </form>
            <p class="mt-4 text-sm text-gray-400 text-center"><a href="login.html" class="text-neon">Back to login</a></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            forgotPassword(e.target.email.value);
        });
    </script>
</body>
</html>
